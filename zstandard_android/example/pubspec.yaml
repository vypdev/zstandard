name: zstandard_android_example
description: "Demonstrates how to use the zstandard_android plugin."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  zstandard_android:
    path: ../
  cupertino_icons: ^1.0.8

dependency_overrides:
  zstandard_native:
    path: ../../zstandard_native

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  kiri_check: ^1.3.1
  leak_tracker: ^11.0.0
  leak_tracker_testing: ^3.0.2

flutter:
  uses-material-design: true
