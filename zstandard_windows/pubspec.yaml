name: zstandard_windows
description: Windows platform implementation of zstandard
version: 1.5.0

homepage: https://vyp.dev
repository: https://github.com/vypdev/zstandard/tree/master/zstandard_windows

environment:
  sdk: ^3.6.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  zstandard_platform_interface: ^1.5.0
  zstandard_native: ^1.5.0
  ffi: ^2.2.0

dev_dependencies:
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  kiri_check: ^1.3.1
  leak_tracker: ^11.0.2
  leak_tracker_testing: ^3.0.2
  mutation_test: ^1.8.0

flutter:
  plugin:
    platforms:
      windows:
        ffiPlugin: true
        pluginClass: ZstandardWindowsPluginCApi
