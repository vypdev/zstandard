# Run with `dart run ffigen --config ffigen.yaml` from this package directory.
# Requires the repo layout: zstd/ at repo root (run sync script first or copy upstream lib/ into zstd/).
name: ZstandardCLIBindings
description: |
  Bindings for zstd.h (canonical source at ../zstd/).

  Regenerate bindings from repo root: ./scripts/regenerate_bindings.sh
  Or from this dir: dart run ffigen --config ffigen.yaml
output: 'lib/src/zstandard_cli_bindings_generated.dart'
headers:
  entry-points:
    - '../zstd/zstd.h'
  include-directives:
    - '../zstd/zstd.h'
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
comments:
  style: any
  length: full
