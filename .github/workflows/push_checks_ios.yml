name: Push Checks iOS

on:
  push:
    branches:
      - '**'
      - '!develop'
      - '!release/**'
      - '!hotfix/**'
      - '!master'
    #paths:
    #  - "zstandard_ios/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: ${{ vars.FLUTTER_VERSION || '3.41.4' }}

jobs:
  check_ios_analyze:
    name: Analyze iOS
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_ios
        run: flutter pub get

      - name: Analyze check
        working-directory: zstandard_ios
        run: flutter analyze

  check_ios_test:
    name: Test iOS
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_ios/example
        run: flutter pub get

      - name: Boot iOS simulator
        run: |
          chmod +x scripts/manage_ios_simulator.sh
          ./scripts/manage_ios_simulator.sh start

      - name: Run integration tests
        run: |
          DEVICE_ID=$(./scripts/manage_ios_simulator.sh device-id)
          cd zstandard_ios/example && flutter test integration_test/ -d "$DEVICE_ID"

  check_ios_publish_dry_run:
    name: Dry Run Publish iOS
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_ios
        run: flutter pub get

      - name: Publish Dry Run
        working-directory: zstandard_ios
        run: dart pub publish --dry-run
