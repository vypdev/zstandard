name: Push Checks Android

on:
  push:
    branches:
      - '**'
      - '!develop'
      - '!master'
    # paths:
      # - "zstandard_android/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: ${{ vars.FLUTTER_VERSION || '3.41.4' }}

jobs:
  check_android_analyze:
    name: Analyze Android
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_android
        run: flutter pub get

      - name: Analyze check
        working-directory: zstandard_android
        run: flutter analyze

  check_android_test:
    name: Test Android
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_android/example
        run: flutter pub get

      - name: Set up JDK 17 (required by sdkmanager/avdmanager)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create and start emulator
        run: |
          chmod +x scripts/manage_android_emulator.sh
          ./scripts/manage_android_emulator.sh create || true
          ./scripts/manage_android_emulator.sh start

      - name: Run integration tests
        run: |
          DEVICE_ID=$(./scripts/manage_android_emulator.sh device-id)
          cd zstandard_android/example && flutter test integration_test/ -d "$DEVICE_ID"

      - name: Stop emulator
        if: always()
        run: ./scripts/manage_android_emulator.sh stop || true

  check_android_publish_dry_run:
    name: Dry Run Publish Android
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_android
        run: flutter pub get

      - name: Publish Dry Run
        working-directory: zstandard_android
        run: dart pub publish --dry-run
