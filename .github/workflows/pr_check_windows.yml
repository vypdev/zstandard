name: PR Check Windows

on:
  pull_request:
    branches:
      - '**'
      - '!develop'
      - '!master'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  check_windows_analyze:
    name: Analyze Windows
    runs-on: [self-hosted, Windows]
    steps:
      - uses: actions/checkout@v4

      - name: Get dependencies
        working-directory: zstandard_windows
        shell: cmd
        run: flutter pub get

      - name: Analyze check
        working-directory: zstandard_windows
        shell: cmd
        run: flutter analyze

  check_windows_test:
    name: Test Windows
    runs-on: [self-hosted, Windows]
    steps:
      - uses: actions/checkout@v4

      - name: Get dependencies
        working-directory: zstandard_windows
        shell: cmd
        run: flutter pub get

      - name: Clean example
        working-directory: zstandard_windows/example
        shell: cmd
        run: flutter clean

      - name: Get example dependencies
        working-directory: zstandard_windows/example
        shell: cmd
        run: flutter pub get

      - name: Run integration tests
        working-directory: zstandard_windows/example
        shell: cmd
        run: flutter test integration_test/ -d windows

  check_windows_test_from_pub_cache:
    name: Test Windows (from pub cache)
    runs-on: [self-hosted, Windows]
    steps:
      - uses: actions/checkout@v4

      - name: Remove zstandard_native to force resolution from pub cache
        shell: cmd
        run: rmdir /s /q zstandard_native

      - name: Clean and get dependencies (force pub cache)
        working-directory: zstandard_windows
        shell: cmd
        run: flutter clean && flutter pub get

      - name: Get dependencies in example (force pub cache)
        working-directory: zstandard_windows/example
        shell: cmd
        run: flutter clean && flutter pub get

      - name: Run integration tests (C sources from pub cache)
        working-directory: zstandard_windows/example
        shell: cmd
        run: flutter test integration_test/ -d windows

  check_windows_publish_dry_run:
    name: Dry Run Publish Windows
    runs-on: [self-hosted, Windows]
    steps:
      - uses: actions/checkout@v4

      - name: Get dependencies
        working-directory: zstandard_windows
        shell: cmd
        run: flutter pub get

      - name: Publish Dry Run
        working-directory: zstandard_windows
        shell: cmd
        run: dart pub publish --dry-run
