name: PR Check macOS

on:
  pull_request:
    branches:
      - '**'
      - '!develop'
      - '!master'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: ${{ vars.FLUTTER_VERSION || '3.41.4' }}

jobs:
  check_macos_analyze:
    name: Analyze macOS
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_macos
        run: flutter pub get

      - name: Analyze check
        working-directory: zstandard_macos
        run: flutter analyze

  check_macos_test:
    name: Test macOS
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Run integration tests
        working-directory: zstandard_macos/example
        run: flutter test integration_test/ -d macos

  check_macos_test_from_pub_cache:
    name: Test macOS (from pub cache)
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Remove zstandard_native to force resolution from pub cache
        run: rm -rf zstandard_native

      - name: Clean and get dependencies (force pub cache)
        working-directory: zstandard_macos
        run: |
          flutter clean
          flutter pub get

      - name: Get dependencies in example (force pub cache)
        working-directory: zstandard_macos/example
        run: |
          flutter clean
          flutter pub get

      - name: Run integration tests (C sources from pub cache)
        working-directory: zstandard_macos/example
        run: flutter test integration_test/ -d macos

  check_macos_publish_dry_run:
    name: Dry Run Publish macOS
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_macos
        run: flutter pub get

      - name: Publish Dry Run
        working-directory: zstandard_macos
        run: dart pub publish --dry-run
