name: Push Checks Platform Interface

on:
  push:
    branches:
      - '**'
      - '!develop'
      - '!release/**'
      - '!hotfix/**'
      - '!master'
    #paths:
    #  - "zstandard_platform_interface/**"


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: ${{ vars.FLUTTER_VERSION || '3.41.4' }}

jobs:
  check_platform_interface_analyze:
    name: Analyze Platform Interface
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_platform_interface
        run: flutter pub get

      - name: Analyze check
        working-directory: zstandard_platform_interface
        run: flutter analyze

  check_platform_interface_test:
    name: Test Platform Interface
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_platform_interface
        run: flutter pub get

      - name: Test check
        working-directory: zstandard_platform_interface
        run: flutter test --coverage

      - name: Install lcov
        run: brew install lcov

      - name: Check coverage threshold (95%)
        working-directory: zstandard_platform_interface
        run: |
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | awk '{print $2}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          if [ -z "$COVERAGE" ]; then echo "Could not parse coverage"; exit 1; fi
          if (( $(echo "$COVERAGE < 95" | bc -l) )); then echo "ERROR: Coverage ${COVERAGE}% is below 95%"; exit 1; fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: zstandard_platform_interface/coverage/lcov.info
          flags: platform_interface
          fail_ci_if_error: true

  check_platform_interface_publish_dry_run:
    name: Dry Run Publish Platform Interface
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_platform_interface
        run: flutter pub get

      - name: Publish Dry Run
        working-directory: zstandard_platform_interface
        run: dart pub publish --dry-run
