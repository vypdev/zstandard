name: Push Checks macOS

on:
  push:
    branches:
      - '**'
      - '!develop'
      - '!release/**'
      - '!hotfix/**'
      - '!master'
    #paths:
    #  - "zstandard_macos/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  check_macos_analyze:
    name: Analyze macOS
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: '3.35.6'

      - name: Get dependencies
        working-directory: zstandard_macos
        run: flutter pub get

      - name: Analyze check
        working-directory: zstandard_macos
        run: flutter analyze

  check_macos_test:
    name: Test macOS
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: '3.35.6'

      - name: Test check
        working-directory: zstandard_macos
        run: flutter test --coverage

      - name: Install lcov
        run: brew install lcov

      - name: Check coverage threshold (95%)
        working-directory: zstandard_macos
        run: |
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | awk '{print $2}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          if [ -z "$COVERAGE" ]; then echo "Could not parse coverage"; exit 1; fi
          if (( $(echo "$COVERAGE < 95" | bc -l) )); then echo "ERROR: Coverage ${COVERAGE}% is below 95%"; exit 1; fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: zstandard_macos/coverage/lcov.info
          flags: macos
          fail_ci_if_error: true

  check_macos_publish_dry_run:
    name: Dry Run Publish macOS
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: '3.35.6'

      - name: Get dependencies
        working-directory: zstandard_macos
        run: flutter pub get

      - name: Publish Dry Run
        working-directory: zstandard_macos
        run: dart pub publish --dry-run
