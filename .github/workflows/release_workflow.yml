      - name: Test check
        working-directory: zstandard_platform_interface
        run: flutter test

  platform_interface_publish_dry_run:
    name: Dry Run Publish Platform Interface
    runs-on: [self-hosted, macOS, X64]
    needs: [tag_version]
    steps:
      - uses: actions/checkout@v4

      - name: Update branch
        run: |
          git pull origin ${{ github.ref }} --rebase

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_platform_interface
        run: flutter pub get

      - name: Publish Dry Run
        working-directory: zstandard_platform_interface
        run: dart pub publish --dry-run

  platform_interface_publish:
    name: Publish Platform Interface
    runs-on: [self-hosted, macOS, X64]
    needs: [platform_interface_analyze, platform_interface_test, platform_interface_publish_dry_run]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update branch
        run: |
          git pull origin ${{ github.ref }} --rebase

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_platform_interface
        run: flutter pub get

      - name: Publish
        working-directory: zstandard_platform_interface
        run: dart pub publish -f

      - name: Verify published on pub.dev
        run: |
          chmod +x .github/scripts/verify-pubdev-package.sh
          .github/scripts/verify-pubdev-package.sh zstandard_platform_interface "${{ github.event.inputs.version }}"

      - name: Compress folder
        run: zip -r zstandard_platform_interface.zip ./zstandard_platform_interface

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          files: "./zstandard_platform_interface.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify platform_interface available on pub.dev
        run: |
          chmod +x .github/scripts/verify-pubdev-package.sh
          .github/scripts/verify-pubdev-package.sh zstandard_platform_interface "${{ github.event.inputs.version }}"

      - name: Get dependencies (platform packages depend on platform_interface)
        run: cd zstandard_android && flutter pub get

  android_analyze:
    name: Analyze Android
    runs-on: [self-hosted, macOS, X64]
    needs: platform_interface_publish
    steps:
      - uses: actions/checkout@v4

      - name: Update branch
