        run: flutter test

  ios_publish_dry_run:
    name: Dry Run Publish iOS
    runs-on: [self-hosted, macOS, X64]
    needs: platform_interface_publish
    steps:
      - uses: actions/checkout@v4

      - name: Update branch
        run: |
          git pull origin ${{ github.ref }} --rebase

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
