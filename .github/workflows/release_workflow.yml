  rollback_guide:
    name: Rollback / recovery guide
    runs-on: ubuntu-latest
    if: always()
    needs: [ platform_interface_publish, android_publish, ios_publish, web_publish, macos_publish, linux_publish, windows_publish, cli_publish, zstandard_publish ]
    permissions:
      contents: read
    steps:
      - name: Output rollback guide
        if: >-
          needs.platform_interface_publish.result == 'failure' ||
          needs.android_publish.result == 'failure' ||
          needs.ios_publish.result == 'failure' ||
          needs.web_publish.result == 'failure' ||
          needs.macos_publish.result == 'failure' ||
          needs.linux_publish.result == 'failure' ||
          needs.windows_publish.result == 'failure' ||
          needs.cli_publish.result == 'failure' ||
          needs.zstandard_publish.result == 'failure'
        run: |
          echo "## Release failed – recovery guide" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: **${{ github.event.inputs.version }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### pub.dev cannot delete published versions. If some packages were published:" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Decide whether to publish the remaining packages manually or bump to a new patch version." >> "$GITHUB_STEP_SUMMARY"
          echo "2. To finish manually: run \`dart pub publish -f\` in each package directory (in dependency order: platform_interface → platforms → cli → zstandard)." >> "$GITHUB_STEP_SUMMARY"
          echo "3. Ensure \`dart pub login\` has been run on the runners (pub credentials available)." >> "$GITHUB_STEP_SUMMARY"
          echo "4. Re-run this workflow with the same version only to retry failed jobs; fix the cause first." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Dependency order for manual publish:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "zstandard_platform_interface → zstandard_android, zstandard_ios, zstandard_web, zstandard_macos, zstandard_windows, zstandard_linux → zstandard_cli → zstandard" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "See \`docs/deployment/RUNBOOK.md\` for full runbook." >> "$GITHUB_STEP_SUMMARY"

  notify_deploy_completed:
    name: Notify deploy completed
    runs-on: ubuntu-latest
    needs: [ zstandard_publish ]
    steps:
      - name: Git Board Flow - Deploy success notification
