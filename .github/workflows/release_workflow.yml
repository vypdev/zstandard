          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_ios
        run: flutter pub get

      - name: Publish
        working-directory: zstandard_ios
        run: dart pub publish -f

      - name: Verify published on pub.dev
        run: |
          chmod +x .github/scripts/verify-pubdev-package.sh
          .github/scripts/verify-pubdev-package.sh zstandard_ios "${{ github.event.inputs.version }}"

      - name: Compress folder
        run: zip -r zstandard_ios.zip ./zstandard_ios

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          files: "./zstandard_ios.zip"
        env:
