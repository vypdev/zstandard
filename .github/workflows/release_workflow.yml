  windows_analyze:
    name: Analyze Windows
    runs-on: [self-hosted, Windows]
    needs: platform_interface_publish
    steps:
      - uses: actions/checkout@v4

      - name: Update branch
        shell: cmd
        run: |
          git pull origin ${{ github.ref }} --rebase

      - name: Get dependencies
        working-directory: zstandard_windows
        shell: cmd
