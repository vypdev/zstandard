name: Push Checks Web

on:
  push:
    branches:
      - '**'
      - '!develop'
      - '!release/**'
      - '!hotfix/**'
    #  - '!master'
    #paths:
    #  - "zstandard_web/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: ${{ vars.FLUTTER_VERSION || '3.41.4' }}

jobs:
  check_web_analyze:
    name: Analyze Web
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_web
        run: flutter pub get

      - name: Analyze check
        working-directory: zstandard_web
        run: flutter analyze

  check_web_test:
    name: Test Web
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_web
        run: flutter pub get

      - name: Get example dependencies
        working-directory: zstandard_web/example
        run: flutter pub get

      - name: Install ChromeDriver
        run: brew install chromedriver

      - name: Remove ChromeDriver quarantine (macOS)
        run: |
          CHROMEDRIVER_BIN=$(command -v chromedriver)
          while [[ -L "$CHROMEDRIVER_BIN" ]]; do
            NEXT=$(readlink "$CHROMEDRIVER_BIN")
            [[ "$NEXT" != /* ]] && NEXT="$(dirname "$CHROMEDRIVER_BIN")/$NEXT"
            CHROMEDRIVER_BIN=$NEXT
          done
          if [[ -f "$CHROMEDRIVER_BIN" ]] && xattr "$CHROMEDRIVER_BIN" 2>/dev/null | grep -q com.apple.quarantine; then
            xattr -d com.apple.quarantine "$CHROMEDRIVER_BIN" 2>/dev/null || true
          fi

      - name: Start ChromeDriver
        run: |
          chromedriver --port=4444 &
          sleep 3
          lsof -i:4444 || (echo "ChromeDriver failed to start"; exit 1)

      - name: Run integration tests (flutter drive + ChromeDriver)
        working-directory: zstandard_web/example
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/zstandard_web_integration_test.dart \
            -d web-server \
            --web-port=8080

  check_web_publish_dry_run:
    name: Dry Run Publish Web
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Get dependencies
        working-directory: zstandard_web
        run: flutter pub get

      - name: Publish Dry Run
        working-directory: zstandard_web
        run: dart pub publish --dry-run
