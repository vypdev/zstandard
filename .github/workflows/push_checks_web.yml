name: Push Checks Web

on:
  push:
    branches:
      - '**'
      - '!develop'
      - '!release/**'
      - '!hotfix/**'
      - '!master'
    #paths:
    #  - "zstandard_web/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  check_web_analyze:
    name: Analyze Web
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: '3.35.6'

      - name: Get dependencies
        working-directory: zstandard_web
        run: flutter pub get

      - name: Analyze check
        working-directory: zstandard_web
        run: flutter analyze

  check_web_test:
    name: Test Web
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: '3.35.6'

      - name: Get dependencies
        working-directory: zstandard_web
        run: flutter pub get

      - name: Unit tests (Chrome)
        working-directory: zstandard_web
        run: flutter test -d chrome --coverage

      - name: Get example dependencies
        working-directory: zstandard_web/example
        run: flutter pub get

      - name: Install ChromeDriver
        run: brew install chromedriver

      - name: Remove ChromeDriver quarantine (macOS)
        run: |
          CHROMEDRIVER_BIN=$(command -v chromedriver)
          while [[ -L "$CHROMEDRIVER_BIN" ]]; do
            NEXT=$(readlink "$CHROMEDRIVER_BIN")
            [[ "$NEXT" != /* ]] && NEXT="$(dirname "$CHROMEDRIVER_BIN")/$NEXT"
            CHROMEDRIVER_BIN=$NEXT
          done
          if [[ -f "$CHROMEDRIVER_BIN" ]] && xattr "$CHROMEDRIVER_BIN" 2>/dev/null | grep -q com.apple.quarantine; then
            xattr -d com.apple.quarantine "$CHROMEDRIVER_BIN" 2>/dev/null || true
          fi

      - name: Start ChromeDriver
        run: |
          chromedriver --port=4444 &
          sleep 3
          lsof -i:4444 || (echo "ChromeDriver failed to start"; exit 1)

      - name: Run integration tests (flutter drive + ChromeDriver)
        working-directory: zstandard_web/example
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/zstandard_web_integration_test.dart \
            -d web-server \
            --web-port=8080

      - name: Install lcov
        run: brew install lcov

      - name: Check coverage threshold (95%)
        working-directory: zstandard_web
        run: |
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | awk '{print $2}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          if [ -z "$COVERAGE" ]; then echo "Could not parse coverage"; exit 1; fi
          if (( $(echo "$COVERAGE < 95" | bc -l) )); then echo "ERROR: Coverage ${COVERAGE}% is below 95%"; exit 1; fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: zstandard_web/coverage/lcov.info
          flags: web
          fail_ci_if_error: true

  check_web_publish_dry_run:
    name: Dry Run Publish Web
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v1
        with:
          channel: 'stable'
          flutter-version: '3.35.6'

      - name: Get dependencies
        working-directory: zstandard_web
        run: flutter pub get

      - name: Publish Dry Run
        working-directory: zstandard_web
        run: dart pub publish --dry-run
