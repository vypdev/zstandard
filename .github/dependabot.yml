# Dependabot: keep GitHub Actions up to date (pinned to SHA in release_workflow)
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "deps(ci)"
    labels:
      - "dependencies"
      - "github-actions"
