# Run with `dart run ffigen --config ffigen.yaml` from this package.
name: ZstandardNativeBindings
description: |
  Bindings for zstd.h from zstandard_native src/zstd/.
  Used by all zstandard platform plugins (Android, iOS, macOS, Linux, Windows).
output: 'lib/zstandard_native_bindings.dart'
headers:
  entry-points:
    - 'src/zstd/zstd.h'
  include-directives:
    - 'src/zstd/zstd.h'
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
comments:
  style: any
  length: full
